<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photorealistic 3D Citywide Fireworks</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010409; color: #fff; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; bottom: 20px; left: 0; width: 100%; text-align: center;
            font-size: 16px; font-weight: 300; letter-spacing: 1px;
            color: rgba(255,255,255,0.8); pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div id="ui">Awaiting click: Complex, realistic 3D fireworks are difficult to render.</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float time;
        uniform float size;
        attribute float scale;
        attribute vec3 velocity;
        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vColor = color;
            vAlpha = 1.0 - (time / 2.0); // Simple fade
            
            // Apply a slight parabolic trajectory for trails (gravity)
            vec3 newPosition = position + velocity * time;
            newPosition.y -= 0.5 * 9.8 * time * time * 0.05; // Gravity
            
            vec4 mvPosition = modelViewMatrix * vec4( newPosition, 1.0 );
            gl_PointSize = size * scale * ( 300.0 / -mvPosition.z ); // Scale with depth
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            // Draw a diffused point
            float distance = length(gl_PointCoord - vec2(0.5, 0.5));
            if (distance > 0.5) discard;
            
            // Add a blooming halo effect
            float glow = 1.0 - smoothstep(0.0, 0.5, distance);
            
            gl_FragColor = vec4(vColor * glow, vAlpha);
        }
    </script>

    <script>
        // Set up the scene, camera, and renderer
        let scene, camera, renderer, clock;
        let ground, citySkyline;
        let activeExplosions = [];
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        // Custom colors matching the image: deep green and golden/copper
        const HUE_GREEN = new THREE.Color(0x32CD32); // LimeGreen
        const HUE_GOLD = new THREE.Color(0xD2691E);  // Chocolate, for a warm copper
        const HUE_WHITE = new THREE.Color(0xFFFFFF);

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010409, 0.005); // Subtle night fog

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            camera.position.set(0, 15, 200); // Low, dramatic angle

            renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.deviceMode ? window.deviceMode : 1);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            // 1. Create a simplistic environment: Water and generic cityscape
            createEnvironment();

            // 2. Add lights (ambient and a warm water light)
            const ambientLight = new THREE.AmbientLight(0x050810, 0.2);
            scene.add(ambientLight);

            // 3. Set up mouse interactivity
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function createEnvironment() {
            // Water plane (simplistic, highly reflective)
            const waterGeometry = new THREE.PlaneGeometry(2000, 2000);
            const waterMaterial = new THREE.MeshPhongMaterial({
                color: 0x050c18,
                specular: 0x111111,
                shininess: 100,
                opacity: 0.9,
                transparent: true,
                reflectivity: 1
            });
            ground = new THREE.Mesh(waterGeometry, waterMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -5;
            scene.add(ground);

            // Cityscape (represented by simple box clusters with faint light texture)
            citySkyline = new THREE.Group();
            for (let i = 0; i < 60; i++) {
                const height = 50 + Math.random() * 80;
                const buildingGeometry = new THREE.BoxGeometry(10 + Math.random() * 20, height, 10 + Math.random() * 10);
                const buildingMaterial = new THREE.MeshBasicMaterial({ color: 0x000103, wireframe: false });
                const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                building.position.set(Math.random() * 2000 - 1000, height / 2 - 5, -300 - Math.random() * 400);
                citySkyline.add(building);
            }
            scene.add(citySkyline);
        }

        class FireworkExplosion {
            constructor(posX, posY, posZ, color, particleCount = 2000) {
                this.particleCount = particleCount;
                this.geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                const colors = new Float32Array(particleCount * 3);
                const velocities = new Float32Array(particleCount * 3);
                const scales = new Float32Array(particleCount);

                for (let i = 0; i < particleCount; i++) {
                    // Start position is the point of burst
                    positions[i * 3] = posX;
                    positions[i * 3 + 1] = posY;
                    positions[i * 3 + 2] = posZ;

                    // Spherical velocity distribution for trails
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    const speed = 20 + Math.random() * 30; // High speed for wide burst

                    velocities[i * 3] = speed * Math.sin(phi) * Math.cos(theta);
                    velocities[i * 3 + 1] = speed * Math.sin(phi) * Math.sin(theta);
                    velocities[i * 3 + 2] = speed * Math.cos(phi);

                    // Colors vary slightly for complexity (green/gold/white mix)
                    const finalColor = color.clone().lerp(HUE_WHITE, Math.random() * 0.4);
                    colors[i * 3] = finalColor.r;
                    colors[i * 3 + 1] = finalColor.g;
                    colors[i * 3 + 2] = finalColor.b;

                    scales[i] = 1 + Math.random() * 2; // Vary particle size
                }

                this.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                this.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                this.geometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));
                this.geometry.setAttribute('scale', new THREE.BufferAttribute(scales, 1));

                this.uniforms = {
                    time: { value: 0.0 },
                    size: { value: 4.0 }, // Bloom size
                };

                this.material = new THREE.ShaderMaterial({
                    uniforms: this.uniforms,
                    vertexShader: document.getElementById('vertexShader').textContent,
                    fragmentShader: document.getElementById('fragmentShader').textContent,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    transparent: true,
                    vertexColors: true,
                });

                this.points = new THREE.Points(this.geometry, this.material);
                scene.add(this.points);

                this.alive = true;
                this.startTime = clock.getElapsedTime();
                this.duration = 1.8 + Math.random() * 0.4; // Lifespan of particles

                activeExplosions.push(this);
            }

            update(delta) {
                if (!this.alive) return;
                this.uniforms.time.value += delta * 1.0;

                if (clock.getElapsedTime() - this.startTime > this.duration) {
                    this.dispose();
                }
            }

            dispose() {
                this.alive = false;
                scene.remove(this.points);
                this.geometry.dispose();
                this.material.dispose();
                activeExplosions = activeExplosions.filter(exp => exp !== this);
            }
        }

        function launchFirework(x, y) {
            // Transform screen-space click to a depth location
            const worldX = (x / window.innerWidth) * 1400 - 700;
            const worldY = (1.0 - (y / window.innerHeight)) * 600 + 100;
            const worldZ = -400 - Math.random() * 200; // Far behind the city plane

            // Alternate colors matching the source image
            const chosenColor = Math.random() < 0.5 ? HUE_GREEN : HUE_GOLD;
            
            new FireworkExplosion(worldX, worldY, worldZ, chosenColor);
        }

        function onMouseMove(event) {
            mouseX = event.clientX - (window.innerWidth / 2);
            mouseY = event.clientY - (window.innerHeight / 2);
        }

        function onMouseDown(event) {
            launchFirework(event.clientX, event.clientY);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Smooth parallax view movement
            targetX += (mouseX - targetX) * 0.01;
            targetY += (mouseY - targetY) * 0.01;
            camera.position.x = -targetX * 0.05;
            camera.position.y = 15 + targetY * 0.01;
            camera.lookAt(0, 50, -500); // Look towards the city/skyline depth

            activeExplosions.forEach(explosion => explosion.update(delta));

            // Simplified volumetric smoke (represented by scene fog interaction)
            // Real smoke requires custom volume shaders beyond this scope.

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
